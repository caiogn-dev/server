{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Pastita Panel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { colors: { brand: { 500: '#722F37', 600: '#5c262d', 700: '#4d1f25' } } } }
    }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="dark min-h-screen bg-zinc-950 flex items-center justify-center p-4">

<div class="w-full max-w-sm" x-data="{ showPw: false }">
  <!-- Logo -->
  <div class="text-center mb-8">
    <div class="inline-flex h-14 w-14 items-center justify-center rounded-2xl bg-brand-500 mb-4 shadow-lg">
      <span class="text-2xl font-bold text-white">P</span>
    </div>
    <h1 class="text-2xl font-bold text-white">Pastita</h1>
    <p class="text-sm text-zinc-400 mt-1">Painel de Gestão</p>
  </div>

  <!-- Card -->
  <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-6 shadow-2xl">
    {% if error %}
    <div class="mb-4 flex items-center gap-2 rounded-lg bg-red-500/10 border border-red-500/20 px-3 py-2.5">
      <svg class="h-4 w-4 text-red-400 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
      <p class="text-sm text-red-400">{{ error }}</p>
    </div>
    {% endif %}

    <form method="post" class="space-y-4">
      {% csrf_token %}

      <!-- Email -->
      <div>
        <label class="block text-xs font-medium text-zinc-400 mb-1.5">E-mail</label>
        <div class="relative">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 h-4 w-4 text-zinc-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207"/>
          </svg>
          <input
            type="text"
            name="email"
            required
            autofocus
            autocomplete="email"
            placeholder="seu@email.com"
            class="w-full bg-zinc-800 border border-zinc-700 text-white placeholder-zinc-600 rounded-lg pl-9 pr-4 py-2.5 text-sm outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500 transition-colors"
          />
        </div>
      </div>

      <!-- Password -->
      <div>
        <label class="block text-xs font-medium text-zinc-400 mb-1.5">Senha</label>
        <div class="relative">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 h-4 w-4 text-zinc-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
          </svg>
          <input
            :type="showPw ? 'text' : 'password'"
            name="password"
            required
            autocomplete="current-password"
            placeholder="••••••••"
            class="w-full bg-zinc-800 border border-zinc-700 text-white placeholder-zinc-600 rounded-lg pl-9 pr-10 py-2.5 text-sm outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500 transition-colors"
          />
          <button type="button" @click="showPw = !showPw"
                  class="absolute right-3 top-1/2 -translate-y-1/2 text-zinc-500 hover:text-zinc-300">
            <svg x-show="!showPw" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
            <svg x-show="showPw" x-cloak class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75">
              <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
            </svg>
          </button>
        </div>
      </div>

      <button type="submit"
              class="w-full flex items-center justify-center gap-2 bg-brand-500 hover:bg-brand-600 text-white font-medium rounded-lg py-2.5 text-sm transition-colors mt-2">
        Entrar
      </button>
    </form>
  </div>

  <p class="text-center text-xs text-zinc-700 mt-6">backend.pastita.com.br/panel/</p>
</div>

</body>
</html>
