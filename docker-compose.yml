# ─────────────────────────────────────────────────────────────────────────────
# Common Django environment — shared by web, celery, celery-beat
# ─────────────────────────────────────────────────────────────────────────────
x-django-env: &django-env
  DJANGO_SETTINGS_MODULE: config.settings.production
  # Core
  SECRET_KEY: ${SECRET_KEY}
  DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
  DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-backend.pastita.com.br}
  DEBUG: "False"
  # Database / Cache
  DATABASE_URL: ${DATABASE_URL}
  # CONN_MAX_AGE=0 é obrigatório com ASGI (Uvicorn): conexões persistentes
  # não funcionam corretamente em contexto async e esgotam o pool do Postgres.
  DB_CONN_MAX_AGE: "0"
  REDIS_URL: ${REDIS_URL}
  CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
  CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
  # CORS / CSRF
  DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS}
  CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
  # URLs
  BASE_URL: ${BASE_URL}
  BACKEND_URL: ${BACKEND_URL}
  FRONTEND_URL: ${FRONTEND_URL}
  DASHBOARD_URL: ${DASHBOARD_URL}
  # WhatsApp
  WHATSAPP_WEBHOOK_VERIFY_TOKEN: ${WHATSAPP_WEBHOOK_VERIFY_TOKEN}
  WHATSAPP_APP_SECRET: ${WHATSAPP_APP_SECRET}
  WHATSAPP_API_VERSION: ${WHATSAPP_API_VERSION:-v18.0}
  DEFAULT_WHATSAPP_ACCOUNT_ID: ${DEFAULT_WHATSAPP_ACCOUNT_ID}
  DEFAULT_WHATSAPP_ACCOUNT_ACCESS_TOKEN: ${DEFAULT_WHATSAPP_ACCOUNT_ACCESS_TOKEN}
  DEFAULT_WHATSAPP_ACCOUNT_PHONE_NUMBER_ID: ${DEFAULT_WHATSAPP_ACCOUNT_PHONE_NUMBER_ID}
  DEFAULT_WHATSAPP_ACCOUNT_WABA_ID: ${DEFAULT_WHATSAPP_ACCOUNT_WABA_ID}
  DEFAULT_WHATSAPP_ACCOUNT_OWNER_EMAIL: ${DEFAULT_WHATSAPP_ACCOUNT_OWNER_EMAIL}
  DEFAULT_STORE_SLUG: ${DEFAULT_STORE_SLUG}
  # Instagram
  INSTAGRAM_APP_ID: ${INSTAGRAM_APP_ID}
  INSTAGRAM_APP_SECRET: ${INSTAGRAM_APP_SECRET}
  INSTAGRAM_WEBHOOK_VERIFY_TOKEN: ${INSTAGRAM_WEBHOOK_VERIFY_TOKEN}
  # AI / LLM
  KIMI_API_KEY: ${KIMI_API_KEY}
  KIMI_BASE_URL: ${KIMI_BASE_URL:-https://api.kimi.com/coding/}
  KIMI_MODEL_NAME: ${KIMI_MODEL_NAME:-kimi-coder}
  NVIDIA_API_KEY: ${NVIDIA_API_KEY}
  NVIDIA_API_BASE_URL: ${NVIDIA_API_BASE_URL:-https://integrate.api.nvidia.com/v1}
  NVIDIA_MODEL_NAME: ${NVIDIA_MODEL_NAME:-meta/llama-3.1-70b-instruct}
  OPENAI_API_KEY: ${OPENAI_API_KEY}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
  LITELLM_PROXY_URL: ${LITELLM_PROXY_URL:-http://litellm-proxy:4000}
  LITELLM_PROXY_KEY: ${LITELLM_PROXY_KEY}
  # Payments
  MERCADO_PAGO_ACCESS_TOKEN: ${MERCADO_PAGO_ACCESS_TOKEN}
  MERCADO_PAGO_PUBLIC_KEY: ${MERCADO_PAGO_PUBLIC_KEY}
  MERCADO_PAGO_WEBHOOK_SECRET: ${MERCADO_PAGO_WEBHOOK_SECRET}
  # Email
  RESEND_API_KEY: ${RESEND_API_KEY}
  DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL}
  # Maps
  GOOGLE_MAPS_KEY: ${GOOGLE_MAPS_KEY}
  HERE_API_KEY: ${HERE_API_KEY}
  # Toca Delivery
  TOCA_DELIVERY_API_URL: ${TOCA_DELIVERY_API_URL:-https://api.tocadelivery.com.br}
  TOCA_DELIVERY_EMAIL: ${TOCA_DELIVERY_EMAIL}
  TOCA_DELIVERY_PASSWORD: ${TOCA_DELIVERY_PASSWORD}
  TOCA_DELIVERY_ENABLED: ${TOCA_DELIVERY_ENABLED:-false}
  # Meta / Pixel
  META_PIXEL_ID: ${META_PIXEL_ID}
  META_CAPI_ACCESS_TOKEN: ${META_CAPI_ACCESS_TOKEN}
  META_CAPI_TEST_EVENT_CODE: ${META_CAPI_TEST_EVENT_CODE:-}
  META_CAPI_VERSION: ${META_CAPI_VERSION:-v25.0}
  META_CAPI_STORE_SLUGS: ${META_CAPI_STORE_SLUGS:-ce-saladas}
  # Storage
  USE_S3: ${USE_S3:-false}
  SERVE_MEDIA_FILES: ${SERVE_MEDIA_FILES:-true}
  MEDIA_URL: ${MEDIA_URL:-/media/}
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
  AWS_STORAGE_BUCKET_NAME: ${AWS_STORAGE_BUCKET_NAME}
  AWS_S3_REGION_NAME: ${AWS_S3_REGION_NAME:-sa-east-1}

services:
  db:
    image: postgres:15-alpine
    container_name: pastita_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: pastita
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres123}
    # max_connections=200 evita "too many clients" com múltiplos workers ASGI + Celery
    command: postgres -c max_connections=200 -c shared_buffers=256MB
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pastita_redis
    restart: unless-stopped
    entrypoint: >
      sh -c "ln -sf /bin/ls /usr/bin/ls 2>/dev/null || true &&
             redis-server --appendonly yes"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: pastita_backend:latest
    container_name: pastita_web
    restart: unless-stopped
    environment:
      <<: *django-env
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn config.asgi:application -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000 --workers 2"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/sse/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  celery:
    image: pastita_backend:latest
    container_name: pastita_celery
    restart: unless-stopped
    environment:
      <<: *django-env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A config.celery worker -l info -Q celery,whatsapp,orders,payments,agents,automation,campaigns,default --concurrency=2
    volumes:
      - media_files:/app/media
    healthcheck:
      test: ["CMD-SHELL", "celery -A config.celery inspect ping --destination celery@$$HOSTNAME 2>/dev/null | grep -q OK || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  celery-beat:
    image: pastita_backend:latest
    container_name: pastita_celery_beat
    restart: unless-stopped
    environment:
      <<: *django-env
    depends_on:
      celery:
        condition: service_healthy
    command: celery -A config.celery beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler --pidfile /tmp/celerybeat.pid
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/celerybeat.pid && kill -0 $(cat /tmp/celerybeat.pid) 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  nginx:
    image: nginx:alpine
    container_name: pastita_nginx
    restart: unless-stopped
    entrypoint: >
      sh -c "ln -sf /bin/ls /usr/bin/ls 2>/dev/null || true &&
             nginx -g 'daemon off;'"
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - static_files:/var/www/static:ro
      - media_files:/var/www/media:ro
    depends_on:
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:80/api/sse/health/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: pastita_cloudflared
    restart: unless-stopped
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    command: tunnel --no-autoupdate run --url http://nginx:80
    depends_on:
      nginx:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  static_files:
  media_files:

networks:
  default:
    name: pastita_network
    external: true
